name: Deploy to OVH (FTP)

on:
  push:
    branches:
      - main
  workflow_dispatch:  # allow manual trigger from the Actions tab

jobs:
  deploy:
    name: Upload to ftp.cluster100.hosting.ovh.net
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.cluster100.hosting.ovh.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp           # OVH cluster100 does not support FTPS explicit
          port: 21
          server-dir: at-yourservice/
          local-dir: ./
          log-level: verbose      # shows exact remote paths — check Actions log to verify landing dir
          state-name: ../.ftp-deploy-sync-state.json   # keep state outside upload dir to avoid stale-cache skips
          exclude: |
            **/.git*
            **/.git*/**
            .claude/**
            CLAUDE.md
            .env
            .env.*
            **/node_modules/**
